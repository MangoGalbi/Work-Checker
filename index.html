<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>사업 현황 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --p: #1a4b8c; --pl: #2563c4; --acc: #e85d26;
  --bg: #f0f4f8; --card: #fff; --text: #1a202c; --sub: #64748b;
  --bd: #d1dce8; --green: #16a34a; --red: #dc2626;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:1rem;color:var(--text);background:#f8fafc;outline:none;-webkit-appearance:none;transition:border .2s}
input:focus{border-color:var(--pl);background:#fff}
.btn{background:var(--p);color:#fff;border:none;padding:13px;border-radius:10px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;width:100%;transition:.15s}
.btn:active{transform:scale(.97)}
.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.gray{background:#e2e8f0;color:var(--sub)}.btn.outline{background:#fff;color:var(--p);border:1.5px solid var(--p)}.btn.accent{background:var(--acc)}.btn.sm{padding:8px 14px;font-size:.82rem;width:auto;display:inline-block}
.row{display:flex;gap:8px}.row .btn{flex:1}
.field{margin-bottom:12px}.field label{font-size:.78rem;font-weight:600;color:var(--sub);display:block;margin-bottom:5px}
header{background:var(--p);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{font-size:1.05rem;font-weight:700}.logo-sub{font-size:.72rem;opacity:.7;margin-top:2px}
main{max-width:680px;margin:0 auto;padding:16px 14px 90px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:20px}
.login-box{background:var(--card);border-radius:18px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.pbar{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.pbar-name{font-size:1.05rem;font-weight:700;line-height:1.3}.pbar-mgr{font-size:.78rem;opacity:.8;margin-top:3px}
.btn-reset{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:7px 12px;border-radius:7px;font-size:.78rem;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:10px}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sitem{background:var(--card);border-radius:10px;padding:12px 14px;border:1.5px solid var(--bd)}.slabel{font-size:.72rem;color:var(--sub);font-weight:500;margin-bottom:4px}.sval{font-size:1rem;font-weight:900;color:var(--p)}
.tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border-radius:12px;padding:5px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.tab{flex:1;text-align:center;padding:10px 6px;border-radius:9px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--sub);border:none;background:none;font-family:inherit;transition:.2s}.tab.on{background:var(--p);color:#fff;box-shadow:0 2px 8px rgba(26,75,140,.25)}
.tc{display:none}.tc.on{display:block}
.bc{background:var(--card);border-radius:14px;border:1.5px solid var(--bd);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.bc-head{padding:14px 16px 0}.bc-title{font-weight:700;font-size:.97rem;color:var(--p);line-height:1.3}
.bc-body{padding:8px 16px 12px}.bnums{display:flex;justify-content:space-between;font-size:.8rem;color:var(--sub);margin-bottom:8px}.bnums strong{color:var(--text)}
.bar-bg{background:var(--bg);border-radius:99px;height:10px;overflow:hidden;margin-bottom:5px}.bar-fill{height:100%;border-radius:99px;transition:width .4s}.bar-ok{background:linear-gradient(90deg,#16a34a,#4ade80)}.bar-warn{background:linear-gradient(90deg,#ca8a04,#fbbf24)}.bar-danger{background:linear-gradient(90deg,#dc2626,#f87171)}
.bc-pct{font-size:.78rem;color:var(--sub);margin-bottom:5px}.bc-remain{font-size:.88rem;font-weight:700;text-align:right}
.bc-actions{display:flex;gap:6px;padding:0 16px 14px}.bc-actions .btn{flex:1;padding:10px;font-size:.83rem}
.exp-toggle{width:100%;background:#f8fafc;border:none;border-top:1px solid var(--bd);padding:11px 16px;font-family:inherit;font-size:.82rem;color:var(--sub);cursor:pointer;text-align:left;display:flex;justify-content:space-between}
.exp-list{border-top:1px solid var(--bd);display:none}.exp-list.open{display:block}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #f1f5f9}.exp-item:last-child{border-bottom:none}
.exp-name{font-size:.85rem;font-weight:500}.exp-date{font-size:.75rem;color:var(--sub);margin-top:1px}.exp-r{display:flex;align-items:center;gap:10px}.exp-amt{font-size:.88rem;font-weight:700;color:var(--red)}.btn-del{background:none;border:none;color:#cbd5e1;font-size:1.1rem;cursor:pointer;padding:4px}
.dc{background:var(--card);border-radius:14px;border:1.5px solid var(--bd);margin-bottom:12px;overflow:hidden}
.dc-name{background:var(--p);color:#fff;padding:11px 16px;font-size:.9rem;font-weight:700}
.dc-badges{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
.dc-bw{display:flex;flex-direction:column;align-items:center;gap:5px}.dc-bl{font-size:.72rem;color:var(--sub);font-weight:600}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:7px 12px;border-radius:99px;font-size:.8rem;font-weight:700;cursor:pointer;border:2px solid transparent;width:100%;text-align:center;transition:.15s}.badge:active{transform:scale(.93)}
.b-done{background:#dcfce7;color:var(--green);border-color:#86efac}.b-todo{background:#fee2e2;color:var(--red);border-color:#fca5a5}.b-none{background:#f1f5f9;color:#94a3b8;border-color:#cbd5e1}
.dc-memo{padding:0 14px 12px}.dc-memo input{font-size:.85rem;padding:9px 12px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin:4px 0}.tag{background:#e0eaff;color:var(--pl);font-size:.72rem;padding:2px 8px;border-radius:99px;font-weight:600}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bd);padding:8px 14px 20px;display:flex;gap:8px;z-index:99;box-shadow:0 -2px 12px rgba(0,0,0,.08)}.bnav .btn{flex:1;padding:12px;font-size:.85rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}.overlay.show{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-height:90vh;overflow-y:auto;animation:up .25s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:#d1d5db;border-radius:99px;margin:0 auto 18px}.sheet h3{font-size:1rem;font-weight:700;color:var(--p);margin-bottom:16px}
.empty{text-align:center;padding:40px 20px;color:var(--sub)}.empty .icon{font-size:2.8rem;margin-bottom:10px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;padding:10px 20px;border-radius:99px;font-size:.85rem;font-weight:600;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1}
.sync-badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:middle}
.sync-ok{background:#dcfce7;color:var(--green)}.sync-fail{background:#fee2e2;color:var(--red)}.sync-ing{background:#fef9c3;color:#854d0e}
@media print{
  .no-print,.bnav,.overlay{display:none!important}
  header{position:static}main{padding:10px}.tc{display:block!important}.tabs{display:none}body{background:#fff}
  .bc-actions,.exp-toggle,.btn-del{display:none!important}.exp-list{display:block!important}.dc-memo input{border:none;padding:0;background:transparent}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">📋 사업 현황 관리</div>
    <div class="logo-sub" id="headerSub">청소년 · 사회복지 현장용</div>
  </div>
  <div style="display:flex;gap:8px" class="no-print">
    <button class="btn accent sm" onclick="window.print()">🖨️ 인쇄</button>
    <button class="btn sm" id="logoutBtn" style="background:#334155;display:none" onclick="logout()">나가기</button>
  </div>
</header>

<main id="app"></main>
<div class="toast" id="toast"></div>

<!-- 단위사업 추가 시트 -->
<div class="overlay" id="addSubOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h3>단위사업 추가</h3>
    <div class="field"><label>단위사업명</label><input id="subName" placeholder="예: 방과후 프로그램 운영"/></div>
    <div class="field"><label>배정 예산 (원)</label><input id="subBudget" type="number" inputmode="numeric" placeholder="예: 3000000"/></div>
    <div class="field"><label>태그 (선택, 쉼표 구분)</label><input id="subTags" placeholder="예: 교육, 문화"/></div>
    <div class="row" style="margin-top:18px">
      <button class="btn gray" onclick="closeSheet('addSubOverlay')">취소</button>
      <button class="btn green" onclick="addSub()">추가</button>
    </div>
  </div>
</div>

<!-- 지출 추가 시트 -->
<div class="overlay" id="addExpOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h3 id="expTitle">지출 추가</h3>
    <div class="field"><label>지출 항목명</label><input id="expName" placeholder="예: 강사비, 재료비"/></div>
    <div class="field"><label>금액 (원)</label><input id="expAmt" type="number" inputmode="numeric" placeholder="예: 150000"/></div>
    <div class="field"><label>날짜</label><input id="expDate" type="date"/></div>
    <div class="row" style="margin-top:18px">
      <button class="btn gray" onclick="closeSheet('addExpOverlay')">취소</button>
      <button class="btn green" onclick="addExp()">추가</button>
    </div>
  </div>
</div>

<!-- 사업 등록 시트 -->
<div class="overlay" id="setupOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h3>사업 등록</h3>
    <div class="field"><label>전체 사업명</label><input id="projName" placeholder="예: 2024년 청소년 지원 사업"/></div>
    <div class="field"><label>담당자명 (선택)</label><input id="projMgr" placeholder="예: 홍길동"/></div>
    <div class="row" style="margin-top:18px">
      <button class="btn gray" onclick="closeSheet('setupOverlay')">취소</button>
      <button class="btn green" onclick="startProject()">등록</button>
    </div>
  </div>
</div>

<!-- Firebase (비동기 로드, 실패해도 앱 동작) -->
<script type="module">
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getDatabase, ref, set, get } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const firebaseConfig = {
      apiKey: "AIzaSyBZx3OWvhNxnMkgjhGpGpiJlDdOETeyLWg",
      authDomain: "work-checking-f8aed.firebaseapp.com",
      databaseURL: "https://work-checking-f8aed-default-rtdb.firebaseio.com",
      projectId: "work-checking-f8aed",
      storageBucket: "work-checking-f8aed.firebasestorage.app",
      messagingSenderId: "276876677750",
      appId: "1:276876677750:web:b978e2280555fe48028557"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window._dbSave = async (code, data) => { await set(ref(db, "projects/" + code), data); };
    window._dbLoad = async (code) => {
      const snap = await get(ref(db, "projects/" + code));
      return snap.exists() ? snap.val() : null;
    };
    window._dbReady = true;
    document.dispatchEvent(new Event("dbReady"));
  } catch(e) {
    console.warn("Firebase 로드 실패, 로컬 모드로 동작:", e);
    window._dbReady = false;
    document.dispatchEvent(new Event("dbReady"));
  }
</script>

<script>
let userCode = localStorage.getItem('spm_code') || null;
let project = null;
let currentSubIdx = -1;
let currentTab = 'budget';
let openExp = {};
let saveTimer = null;
let syncStatus = 'none'; // none, ok, fail, ing

const DOC_TYPES = ['계획서','중간보고','결과보고','기안'];
const S_CYCLE = ['todo','done','none'];
const S_LABEL = {done:'✔ 완료', todo:'✘ 미작성', none:'- 해당없음'};
const S_CLASS = {done:'b-done', todo:'b-todo', none:'b-none'};

function fmt(n){ return Number(n||0).toLocaleString('ko-KR')+'원'; }
function spent(sub){ return (sub.expenses||[]).reduce((s,e)=>s+e.amount,0); }
function remain(sub){ return sub.budget - spent(sub); }
function pct(sub){ return sub.budget>0?Math.min(100,Math.round(spent(sub)/sub.budget*100)):0; }
function today(){ return new Date().toISOString().slice(0,10); }
function defDocs(){ return {계획서:'todo',중간보고:'none',결과보고:'todo',기안:'todo'}; }

// Firebase 데이터 정규화 (누락 필드 보완)
function normalizeProject(data){
  if(!data) return null;
  if(!data.name) return null;
  data.subs = (data.subs || []).map(sub=>({
    name: sub.name || '',
    budget: sub.budget || 0,
    tags: sub.tags || [],
    expenses: (sub.expenses || []).map(e=>({ name:e.name||'', amount:e.amount||0, date:e.date||'' })),
    docs: Object.assign({계획서:'todo',중간보고:'none',결과보고:'todo',기안:'todo'}, sub.docs||{}),
    memo: sub.memo || ''
  }));
  return data;
}

function toast(msg, dur=2000){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}

function setSub(msg){ const el=document.getElementById('headerSub'); if(el) el.textContent=msg; }

// ── 로컬 저장/로드 ──
function localSave(data){ try{ localStorage.setItem('spm_'+userCode, JSON.stringify(data)); }catch(e){} }
function localLoad(){ try{ const d=localStorage.getItem('spm_'+userCode); return d?JSON.parse(d):null; }catch(e){ return null; } }

// ── Firebase 저장/로드 (타임아웃 3초) ──
function withTimeout(promise, ms){
  return Promise.race([promise, new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms))]);
}

async function dbSave(data){
  localSave(data);
  if(!window._dbReady) return;
  setSub('☁️ 저장 중...');
  try{
    await withTimeout(window._dbSave(userCode, data), 5000);
    setSub('✓ 클라우드 저장됨 | 코드: '+userCode);
    setTimeout(()=>setSub('코드: '+userCode), 2500);
  } catch(e){
    setSub('⚠️ 로컬 저장됨 | 코드: '+userCode);
    setTimeout(()=>setSub('코드: '+userCode), 2500);
  }
}

async function dbLoad(){
  const local = normalizeProject(localLoad());
  if(!window._dbReady) return local;
  try{
    const data = await withTimeout(window._dbLoad(userCode), 5000);
    if(data){ const norm=normalizeProject(data); localSave(norm); return norm; }
    return local;
  } catch(e){
    return local;
  }
}

function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>dbSave(project), 800);
}

function logout(){
  if(!confirm('로그아웃 할까요?')) return;
  userCode=null; localStorage.removeItem('spm_code'); project=null; render();
}

async function login(code){
  if(!code.trim()){ alert('코드를 입력해주세요'); return; }
  userCode = code.trim();
  localStorage.setItem('spm_code', userCode);
  document.getElementById('logoutBtn').style.display='';
  setSub('코드: '+userCode);

  // 로컬 데이터 먼저 보여주고
  const local = localLoad();
  project = local;
  render();

  // 백그라운드에서 Firebase 동기화
  if(window._dbReady){
    try{
      setSub('☁️ 동기화 중...');
      const fresh = await withTimeout(window._dbLoad(userCode), 5000);
      if(fresh){ project=fresh; localSave(fresh); render(); }
      setSub('코드: '+userCode);
    } catch(e){ setSub('코드: '+userCode); }
  }
}

function startProject(){
  const name=document.getElementById('projName').value.trim();
  const mgr=document.getElementById('projMgr').value.trim();
  if(!name){ alert('사업명을 입력해주세요'); return; }
  project={name,manager:mgr,subs:[]};
  closeSheet('setupOverlay'); save(); render();
}

function resetProject(){
  if(!confirm('사업을 초기화할까요? 모든 데이터가 삭제됩니다.')) return;
  project=null; dbSave(null); render();
}

function addSub(){
  const name=document.getElementById('subName').value.trim();
  const budget=parseInt(document.getElementById('subBudget').value)||0;
  const tags=document.getElementById('subTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!name){ alert('사업명을 입력해주세요'); return; }
  project.subs.push({name,budget,tags,expenses:[],docs:defDocs(),memo:''});
  closeSheet('addSubOverlay'); save(); render(); switchTab('budget');
  toast('단위사업이 추가됐어요 ✅');
}

function deleteSub(i){
  if(!confirm(`"${project.subs[i].name}" 삭제할까요?`)) return;
  project.subs.splice(i,1); save(); render();
}

function openExpSheet(i){
  currentSubIdx=i;
  document.getElementById('expTitle').textContent='지출 추가 — '+project.subs[i].name;
  document.getElementById('expName').value='';
  document.getElementById('expAmt').value='';
  document.getElementById('expDate').value=today();
  openSheet('addExpOverlay');
}

function addExp(){
  const name=document.getElementById('expName').value.trim();
  const amount=parseInt(document.getElementById('expAmt').value)||0;
  const date=document.getElementById('expDate').value;
  if(!name||!amount){ alert('항목명과 금액을 입력해주세요'); return; }
  project.subs[currentSubIdx].expenses.push({name,amount,date});
  closeSheet('addExpOverlay'); save(); render();
  toast('지출이 추가됐어요 💸');
}

function deleteExp(si,ei){ project.subs[si].expenses.splice(ei,1); save(); render(); }

function toggleExpList(i){
  openExp[i]=!openExp[i];
  const el=document.getElementById('expList-'+i);
  const ar=document.getElementById('expArr-'+i);
  if(el) el.classList.toggle('open',openExp[i]);
  if(ar) ar.textContent=openExp[i]?'▲':'▼';
}

function cycleDoc(si,dt){
  const cur=project.subs[si].docs[dt]||'todo';
  const idx=S_CYCLE.indexOf(cur);
  project.subs[si].docs[dt]=S_CYCLE[(idx+1)%S_CYCLE.length];
  save();
  const el=document.getElementById(`badge-${si}-${dt}`);
  const st=project.subs[si].docs[dt];
  if(el){ el.className=`badge ${S_CLASS[st]}`; el.textContent=S_LABEL[st]; }
  renderSummary();
}

function updateMemo(si,val){ project.subs[si].memo=val; save(); }
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['budget','docs'][i]===tab));
  document.querySelectorAll('.tc').forEach(tc=>tc.classList.remove('on'));
  const el=document.getElementById('tc-'+tab); if(el) el.classList.add('on');
}
function openSheet(id){ document.getElementById(id).classList.add('show'); }
function closeSheet(id){ document.getElementById(id).classList.remove('show'); }

['addSubOverlay','addExpOverlay','setupOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){ if(e.target===this) closeSheet(id); });
});

function render(){
  if(!userCode){ renderLogin(); return; }
  if(!project||!project.name){ renderNoProject(); return; }
  renderMain();
}

function renderLogin(){
  document.getElementById('logoutBtn').style.display='none';
  setSub('청소년 · 사회복지 현장용');
  document.getElementById('app').innerHTML=`
    <div class="login-wrap">
      <div class="login-box">
        <div style="text-align:center;font-size:3rem;margin-bottom:12px">🔐</div>
        <div style="text-align:center;font-size:1.1rem;font-weight:700;color:var(--p);margin-bottom:6px">내 사업 코드 입력</div>
        <div style="text-align:center;font-size:.83rem;color:var(--sub);line-height:1.6;margin-bottom:20px">코드마다 별개의 데이터가 저장돼요.<br>친구와 다른 코드를 쓰면 각자 관리 가능!</div>
        <div class="field">
          <label>나만의 코드 (영문/숫자, 예: hong2024)</label>
          <input id="codeInput" placeholder="코드를 입력하세요" autocomplete="off" autocapitalize="none"
            onkeydown="if(event.key==='Enter') login(this.value)"/>
        </div>
        <div style="font-size:.78rem;color:var(--sub);margin-bottom:16px;line-height:1.5">⚠️ 코드를 잊으면 데이터를 찾을 수 없으니 메모해두세요!</div>
        <button class="btn" onclick="login(document.getElementById('codeInput').value)">🚀 접속하기</button>
      </div>
    </div>`;
}

function renderNoProject(){
  document.getElementById('logoutBtn').style.display='';
  setSub('코드: '+userCode);
  document.getElementById('app').innerHTML=`
    <div class="empty" style="padding-top:60px">
      <div class="icon">📂</div>
      <div style="font-size:1rem;font-weight:700;margin-bottom:6px">사업을 시작해보세요</div>
      <div style="font-size:.85rem;margin-bottom:24px;line-height:1.6">코드 <b>${userCode}</b> 로 사업을 등록하면<br>어디서든 이 코드로 접속해서 관리해요</div>
      <button class="btn" style="width:auto;display:inline-block;padding:13px 32px"
        onclick="document.getElementById('projName').value='';document.getElementById('projMgr').value='';openSheet('setupOverlay')">
        🚀 사업 등록하기
      </button>
    </div>`;
}

function renderSummary(){
  const subs=project.subs||[];
  const tb=subs.reduce((s,sub)=>s+sub.budget,0);
  const ts=subs.reduce((s,sub)=>s+spent(sub),0);
  const dd=subs.reduce((s,sub)=>s+Object.values(sub.docs).filter(v=>v==='done').length,0);
  const dt=subs.reduce((s,sub)=>s+Object.values(sub.docs).filter(v=>v==='todo').length,0);
  const el=document.getElementById('summaryGrid'); if(!el) return;
  el.innerHTML=[['📌 단위사업',subs.length+'개','var(--p)'],['💵 전체 예산',fmt(tb),'var(--p)'],
    ['🔴 총 지출',fmt(ts),'var(--red)'],['🟢 잔여',fmt(tb-ts),'var(--green)'],
    ['✅ 문서 완료',dd+'건','var(--green)'],['⏳ 미작성',dt+'건','var(--red)']
  ].map(([l,v,c])=>`<div class="sitem"><div class="slabel">${l}</div><div class="sval" style="color:${c}">${v}</div></div>`).join('');
}

function renderMain(){
  document.getElementById('logoutBtn').style.display='';
  setSub('코드: '+userCode);
  const subs=project.subs||[];
  const tb=subs.reduce((s,sub)=>s+sub.budget,0);
  const ts=subs.reduce((s,sub)=>s+spent(sub),0);
  const dd=subs.reduce((s,sub)=>s+Object.values(sub.docs).filter(v=>v==='done').length,0);
  const dt=subs.reduce((s,sub)=>s+Object.values(sub.docs).filter(v=>v==='todo').length,0);

  const budgetHTML=subs.length===0
    ?'<div class="empty"><div class="icon">💡</div><p>하단 <b>＋ 사업추가</b> 버튼으로<br>단위사업을 추가하세요</p></div>'
    :subs.map((sub,i)=>{
      const sp=spent(sub),rm=remain(sub),pc=pct(sub);
      const barCls=pc<60?'bar-ok':pc<85?'bar-warn':'bar-danger';
      const remColor=rm>=0?'var(--green)':'var(--red)';
      const tagHTML=sub.tags.length?`<div class="tags">${sub.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:'';
      const expHTML=(sub.expenses||[]).map((e,ei)=>`
        <div class="exp-item">
          <div><div class="exp-name">${e.name}</div><div class="exp-date">${e.date}</div></div>
          <div class="exp-r"><div class="exp-amt">-${fmt(e.amount)}</div>
          <button class="btn-del no-print" onclick="deleteExp(${i},${ei})">✕</button></div>
        </div>`).join('');
      return `<div class="bc">
        <div class="bc-head"><div class="bc-title">${sub.name}</div>${tagHTML}</div>
        <div class="bc-body">
          <div class="bnums"><span>예산 <strong>${fmt(sub.budget)}</strong></span><span>지출 <strong>${fmt(sp)}</strong></span></div>
          <div class="bar-bg"><div class="bar-fill ${barCls}" style="width:${pc}%"></div></div>
          <div class="bc-pct" style="color:${barCls==='bar-danger'?'var(--red)':'var(--sub)'}">사용률 ${pc}%</div>
          <div class="bc-remain" style="color:${remColor}">잔여 ${fmt(Math.abs(rm))} ${rm<0?'⚠️ 초과':''}</div>
        </div>
        <div class="bc-actions no-print">
          <button class="btn green sm" onclick="openExpSheet(${i})">＋ 지출</button>
          <button class="btn red sm" onclick="deleteSub(${i})">삭제</button>
        </div>
        ${sub.expenses.length>0?`
          <button class="exp-toggle no-print" onclick="toggleExpList(${i})">
            <span>지출 내역 ${sub.expenses.length}건</span><span id="expArr-${i}">▼</span>
          </button>
          <div class="exp-list ${openExp[i]?'open':''}" id="expList-${i}">${expHTML}</div>
        `:'<div style="text-align:center;padding:8px 0 12px;color:var(--sub);font-size:.8rem">지출 내역 없음</div>'}
      </div>`;
    }).join('');

  const docHTML=subs.length===0
    ?'<div class="empty"><div class="icon">📄</div><p>단위사업을 먼저 추가해주세요</p></div>'
    :subs.map((sub,i)=>`
      <div class="dc">
        <div class="dc-name">${sub.name}</div>
        <div class="dc-badges">
          ${DOC_TYPES.map(dt=>{const st=sub.docs[dt]||'todo';return `
            <div class="dc-bw"><div class="dc-bl">${dt}</div>
            <span id="badge-${i}-${dt}" class="badge ${S_CLASS[st]}" onclick="cycleDoc(${i},'${dt}')">${S_LABEL[st]}</span>
            </div>`;}).join('')}
        </div>
        <div class="dc-memo"><input value="${(sub.memo||'').replace(/"/g,'&quot;')}" placeholder="메모..." oninput="updateMemo(${i},this.value)"/></div>
      </div>`).join('');

  document.getElementById('app').innerHTML=`
    <div class="pbar">
      <div><div class="pbar-name">${project.name}</div>${project.manager?`<div class="pbar-mgr">담당: ${project.manager}</div>`:''}</div>
      <button class="btn-reset no-print" onclick="resetProject()">초기화</button>
    </div>
    <div class="summary" id="summaryGrid">
      ${[['📌 단위사업',subs.length+'개','var(--p)'],['💵 전체 예산',fmt(tb),'var(--p)'],
         ['🔴 총 지출',fmt(ts),'var(--red)'],['🟢 잔여',fmt(tb-ts),'var(--green)'],
         ['✅ 문서 완료',dd+'건','var(--green)'],['⏳ 미작성',dt+'건','var(--red)']
        ].map(([l,v,c])=>`<div class="sitem"><div class="slabel">${l}</div><div class="sval" style="color:${c}">${v}</div></div>`).join('')}
    </div>
    <div class="tabs no-print">
      <button class="tab ${currentTab==='budget'?'on':''}" onclick="switchTab('budget')">💰 예산 현황</button>
      <button class="tab ${currentTab==='docs'?'on':''}" onclick="switchTab('docs')">📄 문서 현황</button>
    </div>
    <div class="tc ${currentTab==='budget'?'on':''}" id="tc-budget">${budgetHTML}</div>
    <div class="tc ${currentTab==='docs'?'on':''}" id="tc-docs">
      <div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:.76rem;color:var(--sub);align-items:center">
        <span class="badge b-done" style="width:auto;padding:3px 10px;font-size:.72rem">✔ 완료</span>
        <span class="badge b-todo" style="width:auto;padding:3px 10px;font-size:.72rem">✘ 미작성</span>
        <span class="badge b-none" style="width:auto;padding:3px 10px;font-size:.72rem">- 해당없음</span>
        <span>탭하면 변경</span>
      </div>
      ${docHTML}
    </div>
    <div class="bnav no-print">
      <button class="btn outline" onclick="switchTab('budget');scrollTo(0,0)">💰 예산</button>
      <button class="btn green" onclick="document.getElementById('subName').value='';document.getElementById('subBudget').value='';document.getElementById('subTags').value='';openSheet('addSubOverlay')">＋ 사업추가</button>
      <button class="btn outline" onclick="switchTab('docs');scrollTo(0,0)">📄 문서</button>
    </div>`;
}

// 초기 실행 — 로컬 데이터 먼저 바로 보여줌
if(userCode){
  document.getElementById('logoutBtn').style.display='';
  const local = localLoad();
  project = local;
  render();
  // 백그라운드 Firebase 동기화
  document.addEventListener('dbReady', async()=>{
    if(window._dbReady && userCode){
      try{
        setSub('☁️ 동기화 중...');
        const fresh = await withTimeout(window._dbLoad(userCode), 5000);
        if(fresh){ project=fresh; localSave(fresh); render(); }
        setSub('코드: '+userCode);
      }catch(e){ setSub('코드: '+userCode); }
    }
  });
} else {
  render();
}
</script>
</body>
</html>
